# ===== tmux 설정 (WezTerm 스타일 단축키) =====

# 접두키 해제 — Alt 조합으로 직접 바인딩
# (Ctrl+B는 기본 유지하되, 쓸 일 거의 없음)

# --- 패인 분할 ---
bind -n M-d split-window -h -c "#{pane_current_path}"     # Alt+D: 수평 분할 (좌우)
bind -n M-D split-window -v -c "#{pane_current_path}"     # Alt+Shift+D: 수직 분할 (상하)

# --- 패인 닫기 ---
bind -n M-w kill-pane                                      # Alt+W: 패인 닫기

# --- 패인 이동 (Alt+방향키) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- 패인 크기 조절 (Alt+Shift+방향키) ---
bind -n M-S-Left resize-pane -L 2
bind -n M-S-Right resize-pane -R 2
bind -n M-S-Up resize-pane -U 2
bind -n M-S-Down resize-pane -D 2

# --- 윈도우(탭) 관리 ---
bind -n M-t new-window -c "#{pane_current_path}"           # Alt+T: 새 윈도우
bind -n M-[ previous-window                                # Alt+[: 이전 윈도우
bind -n M-] next-window                                    # Alt+]: 다음 윈도우

# --- 마우스 지원 ---
set -g mouse on

# --- 스크롤백 버퍼 (출력 내용 보존량) ---
set -g history-limit 50000

# --- 터미널 색상 ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- 상태바 미니멀 ---
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-left-length 20
set -g status-right "#[fg=#6c7086] %m/%d %H:%M "
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "

# --- 패인 보더 ---
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# --- 인덱스 1부터 시작 ---
set -g base-index 1
setw -g pane-base-index 1

# --- ESC 지연 제거 (vim 등 호환) ---
set -s escape-time 0

# --- 윈도우 번호 자동 정리 ---
set -g renumber-windows on
